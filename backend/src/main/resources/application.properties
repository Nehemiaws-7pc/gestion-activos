spring.application.name=gestion-activos-backend
server.port=${PORT:8080}

# Base de datos H2 (desarrollo local)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Serialización de fechas como ISO string (no como array)
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT - Establece JWT_SECRET como variable de entorno en producción
jwt.secret=${JWT_SECRET:superSecretKeyGestionActivos2026Nehemias2026}
jwt.expiration=${JWT_EXPIRATION:86400000}
